<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Solstice — Core</title>
  <link rel="stylesheet" href="/src/main.css">
</head>
<body>
<div id="app">
  <header>
    <h1>SOLSTICE</h1>
    <div class="sub">CORE MECHANICS PROTOTYPE</div>
  </header>
  <div id="level-header">
    <span id="level-name">Level 1: First Light</span>
  </div>
  <div id="level-subtitle">Place a mirror to route the sunbeam</div>
  <div id="game-area">
    <div id="game-container">
      <canvas id="grid" width="560" height="560"></canvas>
    </div>
  </div>
  <div id="controls">
    <span id="mode-label"><span class="dim">SUN</span></span>
    <button id="reset-btn">RESET</button>
  </div>
  <div id="bottom-bar">
    <span id="mirror-count">Mirrors: 0</span>
    <span id="status">Route the light to the receptor</span>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
