<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solstice - Day 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#c8c8e0;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh}
#app{display:flex;flex-direction:column;align-items:center;gap:10px}
h1{font-size:20px;letter-spacing:4px;color:#ffd700}
#status{font-size:11px;color:#666;min-height:16px}
canvas{display:block;cursor:pointer;border:1px solid #1a1a3a;border-radius:4px}
</style>
</head>
<body>
<div id="app"><h1>SOLSTICE</h1><div>DAY 2 - Ray Tracing</div><div id="status">Beam traces from the sun</div>
<canvas id="grid" width="480" height="480"></canvas></div>
<script>
const W=480,COLS=8,ROWS=8,CELL=W/COLS,c=document.getElementById('grid'),cx=c.getContext('2d'),st=document.getElementById('status');
const g=Array.from({length:ROWS},()=>Array(COLS).fill(0));
g[3][0]=4;g[1][3]=3;g[2][3]=3;g[4][3]=3;g[5][3]=3;g[6][3]=3;
function t(){let x=0,y=3,dx=1,dy=0,r=[];while(1){x+=dx;y+=dy;if(x<0||x>=COLS||y<0||y>=ROWS)break;r.push({x,y});const c=g[y][x];if(c===3)break;if(c===1)[dx,dy]=[-dy,-dx];else if(c===2)[dx,dy]=[dy,dx]}return r}
function d(){cx.clearRect(0,0,W,W);const b=t();for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){const px=x*CELL,py=y*CELL;cx.fillStyle=(x+y)%2===0?'#0d0d22':'#11112a';cx.fillRect(px,py,CELL,CELL);cx.strokeStyle='#1a1a3a';cx.lineWidth=.5;cx.strokeRect(px,py,CELL,CELL);const cx2=px+CELL/2,cy2=py+CELL/2,ce=g[y][x];if(ce===1||ce===2){cx.strokeStyle='#8888bb';cx.lineWidth=3;cx.beginPath();if(ce===1){cx.moveTo(px+8,py+CELL-8);cx.lineTo(px+CELL-8,py+8)}else{cx.moveTo(px+8,py+8);cx.lineTo(px+CELL-8,py+CELL-8)}cx.stroke()}else if(ce===3){cx.fillStyle='#18183a';cx.fillRect(px+3,py+3,CELL-6,CELL-6);cx.fillStyle='#2a2a55';cx.beginPath();cx.arc(cx2,cy2,7,0,Math.PI*2);cx.fill()}else if(ce===4){cx.fillStyle='#ffd700';cx.shadowColor='#ffd700';cx.shadowBlur=15;cx.beginPath();cx.arc(cx2,cy2,8,0,Math.PI*2);cx.fill();cx.shadowBlur=0}}
if(b.length){cx.beginPath();cx.moveTo(CELL/2,3*CELL+CELL/2);b.forEach(p=>cx.lineTo(p.x*CELL+CELL/2,p.y*CELL+CELL/2));cx.strokeStyle='rgba(255,215,0,0.35)';cx.lineWidth=3;cx.shadowColor='#ffd700';cx.shadowBlur=12;cx.stroke();cx.shadowBlur=0;b.forEach(p=>{cx.fillStyle='rgba(255,215,0,0.08)';cx.fillRect(p.x*CELL+4,p.y*CELL+4,CELL-8,CELL-8)});const l=b[b.length-1];const ce=g[l.y][l.x];if(ce===3)st.textContent='Beam stopped by wall';else if(l.x===0||l.x===COLS-1||l.y===0||l.y===ROWS-1)st.textContent='Beam exited grid';else st.textContent='Beam at ('+l.x+', '+l.y+')'}}
c.onclick=e=>{const r=c.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(W/r.height),gx=Math.floor(mx/CELL),gy=Math.floor(my/CELL);if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return;if(g[gy][gx]===3||g[gy][gx]===4)return;g[gy][gx]=(g[gy][gx]+1)%3;d()};
c.oncontextmenu=e=>{e.preventDefault();const r=c.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(W/r.height),gx=Math.floor(mx/CELL),gy=Math.floor(my/CELL);if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return;if(g[gy][gx]===1||g[gy][gx]===2){g[gy][gx]=0;d()}};
d();
</script>
</body>
</html>
