repos:
  - repo: local
    hooks:
      - id: strip-emojis
        name: Strip emojis from code files
        entry: python -c "import sys, re; [open(f,'w',encoding='utf-8').write(re.sub(r'[^\x00-\x7F]+','',open(f,encoding='utf-8').read())) for f in sys.argv[1:]]"
        language: system
        files: \.(php|html|css|js)$
