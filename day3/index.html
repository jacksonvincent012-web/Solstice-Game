<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solstice - Day 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#c8c8e0;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh}
#app{display:flex;flex-direction:column;align-items:center;gap:10px}
h1{font-size:22px;letter-spacing:6px;color:#ffd700}
#status{font-size:12px;color:#777;min-height:16px}
canvas{display:block;cursor:pointer;border:1px solid #1a1a3a;border-radius:4px}
#ctrl{display:flex;gap:8px;align-items:center}
#ctrl button{background:#11112a;color:#888;border:1px solid #222;padding:4px 12px;font-family:inherit;font-size:11px;cursor:pointer;border-radius:2px}
#ctrl button:hover{background:#1a1a3a;color:#ccc;border-color:#444}
.s{color:#ffd700}.m{color:#88bbff}
</style>
</head>
<body>
<div id="app"><h1>SOLSTICE</h1><div>DAY 3 - Day & Night</div><div id="status">Toggle between SUN and MOON</div>
<canvas id="grid" width="480" height="480"></canvas>
<div id="ctrl"><span><span class="s">SUN</span> / <span class="m">MOON</span></span><button id="tb">TOGGLE</button><button id="rb">RESET</button></div></div>
<script>
const W=480,COLS=8,ROWS=8,CELL=W/COLS,c=document.getElementById('grid'),cx=c.getContext('2d'),st=document.getElementById('status'),tb=document.getElementById('tb'),rb=document.getElementById('rb');
const g=Array.from({length:ROWS},()=>Array(COLS).fill(0));
g[6][0]=4;g[1][0]=5;g[7][7]=6;g[0][7]=7;let mode='sun';
function em(){const e=[];for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){if(mode==='sun'&&g[y][x]===4)e.push({x,y,dx:1,dy:0});if(mode==='moon'&&g[y][x]===5)e.push({x,y,dx:1,dy:0})}return e}
function tr(sx,sy,dx,dy){const r=[];while(1){sx+=dx;sy+=dy;if(sx<0||sx>=COLS||sy<0||sy>=ROWS)break;r.push({x:sx,y:sy});const c=g[sy][sx];if(c===3)break;if(c===1)[dx,dy]=[-dy,-dx];else if(c===2)[dx,dy]=[dy,dx]}return r}
function cw(beams){const l=new Set();beams.forEach(b=>b.cells.forEach(p=>l.add(p.x+','+p.y)));for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(g[y][x]===6||g[y][x]===7)if(!l.has(x+','+y))return false;return beams.length>0}
function d(){cx.clearRect(0,0,W,W);const ee=em(),bb=ee.map(e=>({emitter:e,cells:tr(e.x,e.y,e.dx,e.dy)})),won=cw(bb);for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){const px=x*CELL,py=y*CELL;cx.fillStyle=(x+y)%2===0?'#0d0d22':'#11112a';cx.fillRect(px,py,CELL,CELL);cx.strokeStyle='#1a1a3a';cx.lineWidth=.5;cx.strokeRect(px,py,CELL,CELL);const cx2=px+CELL/2,cy2=py+CELL/2,ce=g[y][x];if(ce===1||ce===2){cx.strokeStyle=won?'#ffd700':'#8888bb';cx.lineWidth=3;cx.shadowColor=won?'#ffd700':'transparent';cx.shadowBlur=won?8:0;cx.beginPath();if(ce===1){cx.moveTo(px+8,py+CELL-8);cx.lineTo(px+CELL-8,py+8)}else{cx.moveTo(px+8,py+8);cx.lineTo(px+CELL-8,py+CELL-8)}cx.stroke();cx.shadowBlur=0}else if(ce===3){cx.fillStyle='#18183a';cx.fillRect(px+3,py+3,CELL-6,CELL-6);cx.fillStyle='#2a2a55';cx.beginPath();cx.arc(cx2,cy2,7,0,Math.PI*2);cx.fill()}else if(ce===4){cx.fillStyle='#ffd700';cx.shadowColor='#ffd700';cx.shadowBlur=mode==='sun'?20:0;cx.beginPath();cx.arc(cx2,cy2,7,0,Math.PI*2);cx.fill();cx.shadowBlur=0}else if(ce===5){cx.fillStyle='#88bbff';cx.shadowColor='#88bbff';cx.shadowBlur=mode==='moon'?20:0;cx.beginPath();cx.arc(cx2,cy2,7,0,Math.PI*2);cx.fill();cx.shadowBlur=0}else if(ce===6){cx.fillStyle='#ffd700';cx.beginPath();cx.arc(cx2,cy2,5,0,Math.PI*2);cx.fill();cx.strokeStyle='#ffd700';cx.lineWidth=1.5;cx.beginPath();cx.arc(cx2,cy2,9,0,Math.PI*2);cx.stroke()}else if(ce===7){cx.fillStyle='#88bbff';cx.beginPath();cx.arc(cx2,cy2,5,0,Math.PI*2);cx.fill();cx.strokeStyle='#88bbff';cx.lineWidth=1.5;cx.beginPath();cx.arc(cx2,cy2,9,0,Math.PI*2);cx.stroke()}}
const bc=mode==='sun'?'#ffd700':'#88bbff';bb.forEach(b=>{if(b.cells.length<1)return;cx.beginPath();cx.moveTo(b.emitter.x*CELL+CELL/2,b.emitter.y*CELL+CELL/2);b.cells.forEach(p=>cx.lineTo(p.x*CELL+CELL/2,p.y*CELL+CELL/2));cx.strokeStyle=bc;cx.globalAlpha=.35;cx.lineWidth=3;cx.shadowColor=bc;cx.shadowBlur=12;cx.stroke();cx.shadowBlur=0;cx.globalAlpha=1});st.textContent=won?'Both receptors lit!':'Mode: '+mode.toUpperCase()}
c.onclick=e=>{const r=c.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(W/r.height),gx=Math.floor(mx/CELL),gy=Math.floor(my/CELL);if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return;if(g[gy][gx]===3||g[gy][gx]>=4)return;g[gy][gx]=(g[gy][gx]+1)%3;d()};
c.oncontextmenu=e=>{e.preventDefault();const r=c.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(W/r.height),gx=Math.floor(mx/CELL),gy=Math.floor(my/CELL);if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return;if(g[gy][gx]===1||g[gy][gx]===2){g[gy][gx]=0;d()}};
tb.onclick=()=>{mode=mode==='sun'?'moon':'sun';d()};
rb.onclick=()=>{for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(g[y][x]===1||g[y][x]===2)g[y][x]=0;d()};
d();
</script>
</body>
</html>
